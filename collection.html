<style>
:root{
  --accent:#d14c8e;
  --accent-dark:#b83f7a;
  --accent-soft:#fde7f1;
}

body{
  font-family:Montserrat,sans-serif;
}

h1,h2,h3,h4{
  font-family:'Playfair Display',serif;
}

.nav-link{
  position:relative;
  transition:.25s;
}

.nav-link:hover{
  color:var(--accent);
}

.nav-link::after{
  content:"";
  position:absolute;
  left:0;
  bottom:-5px;
  width:0;
  height:2px;
  background:var(--accent);
  transition:.3s;
}

.nav-link:hover::after{
  width:100%;
}

.section-label{
  color:var(--accent);
  text-transform:uppercase;
  letter-spacing:.22em;
  font-size:.78rem;
  font-weight:600;
}

.filter-btn{
  text-transform:uppercase;
  font-size:.78rem;
  letter-spacing:.16em;
  padding:.55rem 1rem;
  border-bottom:2px solid transparent;
  cursor:pointer;
  transition:.25s;
  color:#444;
}

.filter-btn:hover{
  color:var(--accent);
}

.filter-btn.active{
  border-color:var(--accent);
  color:var(--accent-dark);
}

.product-card{
  transition:transform .3s ease, box-shadow .3s ease;
}

.product-card:hover{
  transform:translateY(-5px);
  box-shadow:0 16px 35px rgba(0,0,0,.08);
}

.product-image{
  transition:transform .35s ease;
}

.product-card:hover .product-image{
  transform:scale(1.03);
}

.soft-badge{
  background:var(--accent-soft);
  color:var(--accent-dark);
}

.social-icon{
  color:#9ca3af;
  transition:.25s;
}

.social-icon:hover{
  color:var(--accent);
}
</style>
</head>

<footer class="bg-black text-white py-10">

    <a href="https://www.instagram.com/zirconzone" target="_blank" class="social-icon">

    </a>

    <a href="https://www.facebook.com/profile.php?id=100092590311027" target="_blank" class="social-icon">
      <i class="fa-brands fa-facebook-f"></i>
    </a>

    <a href="https://www.tiktok.com/@zircon_zone" target="_blank" class="social-icon">

    </a>

    <a href="mailto:zirconzonejewelry@gmail.com" class="social-icon">
      <i class="fa-solid fa-envelope"></i>

  </div>

  <p class="text-center text-gray-400 text-sm">
    © 2026 Zircon Zone. All rights reserved.
  </p>
</footer>

<script>

    icon.classList.add("fa-bars");
  } else {
    icon.classList.remove("fa-bars");
    icon.classList.add("fa-xmark");
  }
}

products.forEach(p => p.currentImage = 0);

function renderProducts(list) {
  const grid = document.getElementById("productGrid");
  grid.innerHTML = "";

  list.forEach((p, idx) => {
    grid.innerHTML += `
      <div class="product-card bg-white p-4 md:p-5 rounded-2xl shadow-sm border border-gray-100">
        <div class="relative h-64 md:h-72 lg:h-80 mb-5 rounded-2xl overflow-hidden flex items-center justify-center bg-white">
          <span class="absolute top-3 left-3 text-[10px] uppercase tracking-[0.2em] px-3 py-1 rounded-full soft-badge z-10">
            ${p.category}
          </span>

          <img id="img-${idx}" src="${p.images[p.currentImage]}" class="product-image object-contain w-full h-full" alt="${p.name}">
          
          ${p.images.length > 1 ? `
            <button onclick="changeImage('${p.name}', -1, ${idx})" 
              class="absolute left-3 top-1/2 -translate-y-1/2 bg-white/85 hover:bg-white px-3 py-2 rounded-full shadow text-sm transition">
              <i class="fa-solid fa-chevron-left"></i>
            </button>
            <button onclick="changeImage('${p.name}', 1, ${idx})" 
              class="absolute right-3 top-1/2 -translate-y-1/2 bg-white/85 hover:bg-white px-3 py-2 rounded-full shadow text-sm transition">
              <i class="fa-solid fa-chevron-right"></i>
            </button>
          ` : ""}
        </div>

        <div class="text-center">
          <h3 class="text-lg font-medium mb-1">${p.name}</h3>
          <p class="text-base font-semibold">€${p.price.toFixed(2)}</p>
        </div>
      </div>
    `;
  });
}

function changeImage(name, direction, idx) {
  const product = products.find(p => p.name === name);
  if (!product) return;

  product.currentImage =
    (product.currentImage + direction + product.images.length) % product.images.length;

  document.getElementById(`img-${idx}`).src =
    product.images[product.currentImage];
}

function filterProducts(e, category) {
  currentCategory = category;

  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  if (e && e.target) e.target.classList.add("active");

  const filtered =
    category === "All"
      ? products
      : products.filter(p => p.category === category);

  renderProducts(filtered);
}

document.addEventListener("DOMContentLoaded", () => {
  renderProducts(products);
});
</script>
