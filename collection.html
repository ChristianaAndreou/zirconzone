<head>

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>
    :root{
      --accent:#d14c8e;
      --accent-dark:#b83f7a;
      --accent-soft:#fde7f1;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      font-family:Montserrat,sans-serif;
    }

    h1,h2,h3,h4{
      font-family:'Playfair Display',serif;
    }

    .nav-link{
      position:relative;
      transition:.25s;
    }

    .nav-link:hover{
      color:var(--accent);
    }

    .nav-link::after{
      content:"";
      position:absolute;
      left:0;
      bottom:-5px;
      width:0;
      height:2px;
      background:var(--accent);
      transition:.3s;
    }

    .nav-link:hover::after{
      width:100%;
    }

    .nav-link.active{
  color:var(--accent);
}

 .nav-link.active::after{
   width:100%;
 }

    .section-label{
      color:var(--accent);
      text-transform:uppercase;
      letter-spacing:.22em;
      font-size:.78rem;
      font-weight:600;
    }

    .filter-btn{
      text-transform:uppercase;
      font-size:.78rem;
      letter-spacing:.16em;
      padding:.55rem 1rem;
      border-bottom:2px solid transparent;
      cursor:pointer;
      transition:.25s;
      color:#444;
    }

    .filter-btn:hover{
      color:var(--accent);
    }

    .filter-btn.active{
      border-color:var(--accent);
      color:var(--accent-dark);
    }

    .product-card{
      transition:transform .3s ease, box-shadow .3s ease;
    }

    .product-card:hover{
      transform:translateY(-5px);
      box-shadow:0 16px 35px rgba(0,0,0,.08);
    }

    .product-image{
      transition:transform .35s ease;
    }

    .product-card:hover .product-image{
      transform:scale(1.03);
    }

    .soft-badge{
      background:var(--accent-soft);
      color:var(--accent-dark);
    }

    .social-icon{
      color:#9ca3af;
      transition:.25s;
    }

    .social-icon:hover{
      color:var(--accent);
    }
  </style>
</head>

<body class="bg-white text-gray-900">

  <!-- HERO -->
  <section class="py-20 text-center bg-gradient-to-br from-white via-gray-50 to-white">
    <p class="section-label mb-3">Collection</p>
    <h1 class="text-4xl md:text-5xl mb-4">Discover our Collection</h1>
    <p class="text-gray-600 max-w-2xl mx-auto px-4">
      Discover carefully selected pieces designed for everyday shine.
    </p>
  </section>

  <!-- FILTERS + PRODUCTS -->
  <section class="py-12 bg-white">
    <div class="max-w-7xl mx-auto px-4">
      <div class="flex justify-center gap-5 mb-12 flex-wrap">
        <button onclick="filterProducts(event, 'All')" class="filter-btn active">All</button>
        <button onclick="filterProducts(event, 'Sets')" class="filter-btn">Sets</button>
        <button onclick="filterProducts(event, 'Earrings')" class="filter-btn">Earrings</button>
        <button onclick="filterProducts(event, 'Necklaces')" class="filter-btn">Necklaces</button>
        <button onclick="filterProducts(event, 'Bracelets')" class="filter-btn">Bracelets</button>
        <button onclick="filterProducts(event, 'Rings')" class="filter-btn">Rings</button>
      </div>

      <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="bg-black text-white py-10">
    <div class="flex justify-center gap-6 text-xl mb-4">
      <a href="https://www.instagram.com/zirconzone" target="_blank" class="social-icon">
        <i class="fa-brands fa-instagram"></i>
      </a>

      <a href="https://www.facebook.com/profile.php?id=100092590311027" target="_blank" class="social-icon">
        <i class="fa-brands fa-facebook-f"></i>

      <a href="https://www.tiktok.com/@zircon_zone" target="_blank" class="social-icon">

    <p class="text-center text-gray-400 text-sm">
      © 2026 Zircon Zone. All rights reserved.
    </p>
  </footer>

  <script>

      if(menu.classList.contains("hidden")){
        icon.classList.remove("fa-xmark");
        icon.classList.add("fa-bars");
      } else {
        icon.classList.remove("fa-bars");
        icon.classList.add("fa-xmark");
      }
    }

    let currentCategory = "All";

    const products = [
      { id: "set-1", name: "Set 1", price: 12.00, category: "Sets", images: ["images/S7.png"] }, 
      { id: "set-2", name: "Set 2", price: 20.00, category: "Sets", images: ["images/S2.png", "images/S10.jpeg", "images/S1.png"] }, 
      { id: "set-3", name: "Set 3", price: 12.00, category: "Sets", images: ["images/S5.jpg", "images/S6.jpg"] },

      { id: "earrings-4", name: "Earrings 4", price: 20.00, category: "Earrings", images: ["images/E25.png", "images/E26.png", "images/E27.png", "images/E28.png"] }, 
      { id: "earrings-5", name: "Earrings 5", price: 20.00, category: "Earrings", images: ["images/E42.png"] },

      { id: "bracelet-2", name: "Bracelet 2 (for men)", price: 10.00, category: "Bracelets", images: ["images/B4.png"] }, 
      { id: "bracelet-3", name: "Bracelet 3", price: 7.00, category: "Bracelets", images: ["images/B10.png", "images/B1.png"] }, 
      { id: "bracelet-4", name: "Bracelet 4", price: 3.00, category: "Bracelets", images: ["images/B2.png", "images/B6.png"] },

      { id: "ring-1", name: "Ring 1", price: 10.00, category: "Rings", images: ["images/R3.png"] }, 
      { id: "ring-2", name: "Ring 2", price: 7.00, category: "Rings", images: ["images/R1.png"] }, 
      { id: "ring-3", name: "Ring 3", price: 7.00, category: "Rings", images: ["images/R2.png"] }
    ];

    products.forEach(p => p.currentImage = 0);

    function renderProducts(list) {
      const grid = document.getElementById("productGrid");
      grid.innerHTML = "";

      list.forEach((p, idx) => {
        grid.innerHTML += `
          <div id="${p.id}" class="product-card bg-white p-4 md:p-5 rounded-2xl shadow-sm border border-gray-100 scroll-mt-24">
            <div class="relative h-64 md:h-72 lg:h-80 mb-5 rounded-2xl overflow-hidden flex items-center justify-center bg-white">
              <span class="absolute top-3 left-3 text-[10px] uppercase tracking-[0.2em] px-3 py-1 rounded-full soft-badge z-10">
                ${p.category}
              </span>

              <img id="img-${idx}" src="${p.images[p.currentImage]}" class="product-image object-contain w-full h-full" alt="${p.name}">
              
              ${p.images.length > 1 ? `
                <button onclick="changeImage('${p.name}', -1, ${idx})" 
                  class="absolute left-3 top-1/2 -translate-y-1/2 bg-white/85 hover:bg-white px-3 py-2 rounded-full shadow text-sm transition">
                  <i class="fa-solid fa-chevron-left"></i>
                </button>
                <button onclick="changeImage('${p.name}', 1, ${idx})" 
                  class="absolute right-3 top-1/2 -translate-y-1/2 bg-white/85 hover:bg-white px-3 py-2 rounded-full shadow text-sm transition">
                  <i class="fa-solid fa-chevron-right"></i>
                </button>
              ` : ""}
            </div>

            <div class="text-center">
              <h3 class="text-lg font-medium mb-1">${p.name}</h3>
              <p class="text-base font-semibold">€${p.price.toFixed(2)}</p>
            </div>
          </div>
        `;
      });
    }

    function changeImage(name, direction, idx) {
      const product = products.find(p => p.name === name);
      if (!product) return;

      product.currentImage =
        (product.currentImage + direction + product.images.length) % product.images.length;

      document.getElementById(`img-${idx}`).src =
        product.images[product.currentImage];
    }

    function filterProducts(e, category) {
      currentCategory = category;

      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      if (e && e.target) e.target.classList.add("active");

      const filtered =
        category === "All"
          ? products
          : products.filter(p => p.category === category);

      renderProducts(filtered);
      scrollToHashProduct();
    }

    function scrollToHashProduct() {
      const hash = window.location.hash;
      if (!hash) return;

      setTimeout(() => {
        const target = document.querySelector(hash);
        if (target) {
          target.scrollIntoView({ behavior: "smooth", block: "start" });
        }
      }, 120);
    }

    document.addEventListener("DOMContentLoaded", () => {
      renderProducts(products);
      scrollToHashProduct();
    });
  </script>

</html>
